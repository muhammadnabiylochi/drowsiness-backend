{% load static %}
<!DOCTYPE html>
<html lang="uz" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uyqusini Aniqlash Tizimi</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.2.0/dist/css/tabler.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
  <style>
    .page-wrapper{min-height:100vh}
    #localVideo{width:100%;background:#000;border-radius:4px;display:block;min-height:280px;object-fit:cover;transform:scaleX(-1)}
    .state-badge{font-size:1.5rem;font-weight:700;letter-spacing:2px}
    .state-awake{color:#2fb344}
    .state-drowsy{color:#d63939;animation:blink .5s infinite}
    .state-yawning{color:#f76707}
    .state-default{color:#667382}
    @keyframes blink{50%{opacity:.4}}
    .metric-val{font-size:1.4rem;font-weight:700;font-family:'JetBrains Mono',monospace}
    .log-box{max-height:280px;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:12px}
    .log-box .text-danger{font-weight:600}
    .live-dot{width:10px;height:10px;border-radius:50%;display:inline-block;animation:livepulse 1.5s infinite}
    .live-dot.on{background:#2fb344;box-shadow:0 0 8px #2fb344}
    .live-dot.off{background:#d63939;animation:none}
    @keyframes livepulse{0%,100%{opacity:1}50%{opacity:.3}}
    .card{border:1px solid rgba(98,105,118,.16)}
    #startBtn{width:100%}
    canvas{display:none}
  </style>
</head>
<body>
  <div class="page">

    <!-- Navbar -->
    <header class="navbar navbar-expand-md navbar-dark d-print-none">
      <div class="container-xl">
        <h1 class="navbar-brand navbar-brand-autodark d-none-navbar-horizontal pe-0 pe-md-3">
          <span class="badge bg-cyan text-white me-2">UAT</span>
          Uyqusini Aniqlash Tizimi
        </h1>
        <div class="navbar-nav flex-row order-md-last">
          <div class="nav-item d-flex align-items-center me-3">
            <span class="live-dot off me-2" id="wsDot"></span>
            <span class="text-secondary small" id="wsLabel">Ulanmoqda...</span>
          </div>
          <div class="nav-item d-flex align-items-center me-3">
            <i class="ti ti-activity me-1 text-secondary"></i>
            <span class="text-secondary small" id="fpsLabel">-- FPS</span>
          </div>
          <div class="nav-item">
            <a href="/admin/" class="btn btn-sm btn-outline-primary">
              <i class="ti ti-settings me-1"></i>Panel
            </a>
          </div>
        </div>
      </div>
    </header>

    <!-- Page -->
    <div class="page-wrapper">
      <div class="page-body">
        <div class="container-xl">
          <div class="row g-3">

            <!-- Left: Camera -->
            <div class="col-lg-8">
              <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                  <h3 class="card-title">
                    <i class="ti ti-camera me-2"></i>Kamera
                  </h3>
                  <span class="badge bg-red text-white" id="liveBadge" style="display:none">
                    <span class="live-dot on me-1" style="width:6px;height:6px"></span>JONLI
                  </span>
                </div>
                <div class="card-body p-2">
                  <video id="localVideo" autoplay playsinline muted></video>
                  <canvas id="captureCanvas" width="320" height="240"></canvas>
                  <div class="mt-2 d-flex gap-2">
                    <button id="startBtn" class="btn btn-primary" onclick="startCamera()">
                      <i class="ti ti-camera me-1"></i>Kamerani yoqish
                    </button>
                    <button id="flipBtn" class="btn btn-outline-secondary" onclick="flipCamera()" style="display:none">
                      <i class="ti ti-refresh"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <!-- Right: State + Metrics + Log -->
            <div class="col-lg-4">

              <!-- Driver State -->
              <div class="card" id="stateCard">
                <div class="card-body text-center py-4">
                  <div class="mb-2">
                    <i class="ti ti-steering-wheel" style="font-size:2rem" id="stateIcon"></i>
                  </div>
                  <div class="state-badge state-default" id="stateText">KUTILMOQDA</div>
                  <div class="text-secondary mt-1">
                    Ishonchlilik: <strong id="vC">--</strong>
                  </div>
                </div>
              </div>

              <!-- Metrics -->
              <div class="card mt-2">
                <div class="card-body py-2 px-3">
                  <div class="row g-2 text-center">
                    <div class="col-6">
                      <div class="text-secondary" style="font-size:10px">KO'Z (EAR)</div>
                      <div class="metric-val" id="vEar">--</div>
                    </div>
                    <div class="col-6">
                      <div class="text-secondary" style="font-size:10px">OG'IZ (MAR)</div>
                      <div class="metric-val" id="vMar">--</div>
                    </div>
                    <div class="col-6">
                      <div class="text-secondary" style="font-size:10px">MILTILLASH</div>
                      <div class="metric-val" id="vBlink">--</div>
                    </div>
                    <div class="col-6">
                      <div class="text-secondary" style="font-size:10px">PERCLOS</div>
                      <div class="metric-val" id="vPerclos">--</div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Event Log -->
              <div class="card mt-2">
                <div class="card-header">
                  <h3 class="card-title"><i class="ti ti-list me-2"></i>Hodisalar</h3>
                </div>
                <div class="card-body p-2">
                  <div class="log-box" id="log">
                    <div class="text-secondary"><span class="text-cyan">[tizim]</span> Kamerani yoqing...</div>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>

      <footer class="footer footer-transparent d-print-none">
        <div class="container-xl">
          <div class="text-secondary text-center small">
            Asos: Safarov va b. (2023) — Sensors 23(14), 6459
          </div>
        </div>
      </footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.2.0/dist/js/tabler.min.js"></script>
  <script src="{% static 'js/dashboard.js' %}"></script>
</body>
</html>
